<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>喵王的食谱</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=2" />
    <!-- This make sure browser download the most current version each time. Delete for cache(better performance) -->
  </head>
  <body>
    <div id="loadingOverlay">
      <div class="spinner"></div>
      <span>加载中...</span>
    </div>

    <div class="app">
      <header>
        <div class="logo">🐱 喵王的<span>食谱</span></div>
        <div class="header-controls">
          <div class="house-selector">
            <button class="house-btn" onclick="toggleHouseDropdown()">
              🏠 <span id="currentHouseName">默认家</span>
            </button>
            <div id="houseDropdown" class="house-dropdown hidden">
              <div id="houseList" class="house-list"></div>
              <div class="house-actions">
                <button
                  class="house-action-btn add"
                  onclick="openNewHouseDialog()"
                >
                  ＋ 新家
                </button>
                <button
                  class="house-action-btn"
                  id="renameHouseBtn"
                  onclick="openRenameHouseDialog()"
                >
                  ✏ 改名
                </button>
                <button
                  class="house-action-btn delete"
                  id="deleteHouseBtn"
                  disabled
                  onclick="openDeleteHouseDialog()"
                >
                  🗑 删除
                </button>
              </div>
            </div>
          </div>
          <div class="header-tabs">
            <button
              class="tab-btn active"
              id="tab-recipes"
              onclick="switchView('recipes', this)"
            >
              🍽 菜谱
            </button>
            <button
              class="tab-btn"
              id="tab-ingredients"
              onclick="switchView('ingredients', this)"
            >
              🛒 食材
            </button>
            <button
              class="tab-btn"
              id="tab-manage"
              onclick="switchView('manage', this)"
            >
              ≡ 编辑清单
            </button>
          </div>
        </div>
        <div id="saveStatus"></div>
      </header>

      <main>
        <div id="view-recipes" class="view active">
          <div class="search-bar">
            <input
              type="text"
              id="searchInput"
              placeholder="搜索菜名..."
              oninput="renderRecipes()"
            />
            <button class="new-recipe-btn" onclick="openNewRecipe()">
              ＋ 新建菜谱
            </button>
          </div>
          <div class="filter-row">
            <span class="filter-label">烹饪方式：</span>
            <button
              class="filter-chip active"
              data-filter="all"
              onclick="setFilter('all')"
            >
              全部
            </button>
            <button
              class="filter-chip"
              data-filter="boil"
              onclick="setFilter('boil')"
            >
              🫕 水煮
            </button>
            <button
              class="filter-chip"
              data-filter="oven"
              onclick="setFilter('oven')"
            >
              🔥 烤箱
            </button>
            <button
              class="filter-chip"
              data-filter="air"
              onclick="setFilter('air')"
            >
              💨 空气炸锅
            </button>
            <button
              class="filter-chip"
              data-filter="fry"
              onclick="setFilter('fry')"
            >
              🍳 炒菜
            </button>
            <button
              class="filter-chip"
              data-filter="other"
              onclick="setFilter('other')"
            >
              🥄 其它
            </button>
            <div class="match-toggle" onclick="toggleMatchFilter()">
              <div class="toggle-switch" id="matchToggle"></div>
              <span>仅看我有必要食材的</span>
            </div>
          </div>
          <div class="results-count" id="resultsCount"></div>
          <div class="recipe-grid" id="recipeGrid"></div>
        </div>

        <div id="view-ingredients" class="view">
          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              margin-bottom: 20px;
              flex-wrap: wrap;
              gap: 10px;
            "
          >
            <div>
              <div
                style="
                  font-family: &quot;Noto Serif SC&quot;, serif;
                  font-size: 20px;
                  font-weight: 700;
                  margin-bottom: 4px;
                "
              >
                我的食材
              </div>
              <div style="font-size: 13px; color: var(--ink-light)">
                勾选你目前拥有的食材，菜谱页将自动匹配
              </div>
            </div>
            <div style="display: flex; gap: 8px; align-items: center">
              <span style="font-size: 13px; color: var(--ink-light)"
                >已拥有
                <strong id="ownedCount" style="color: var(--accent)">0</strong>
                种</span
              >
              <button
                class="new-recipe-btn"
                style="font-size: 13px; padding: 7px 14px"
                onclick="
                  switchView('manage', document.getElementById('tab-manage'))
                "
              >
                ≡ 编辑清单
              </button>
              <button
                class="clear-expired-btn"
                onclick="clearExpiredIngredients()"
              >
                一键清空过期
              </button>
            </div>
          </div>
          <div id="ingredientsCheckList"></div>
        </div>

        <div id="view-manage" class="view">
          <div class="manage-header">
            <div class="manage-title">编辑食材清单</div>
            <div style="font-size: 13px; color: var(--ink-light)">
              管理食材分类，添加或删除食材
            </div>
          </div>
          <div class="manage-grid" id="manageGrid"></div>
          <div class="new-cat-row">
            <input
              type="text"
              id="newCatInput"
              placeholder="新分类名称..."
              onkeydown="if (event.key === 'Enter') addCategory();"
            />
            <button class="new-cat-btn" onclick="addCategory()">
              ＋ 新增分类
            </button>
          </div>
        </div>
      </main>
    </div>

    <div
      class="modal-overlay"
      id="modalOverlay"
      onclick="closeModalOnOverlay(event)"
    >
      <div class="modal" id="recipeModal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <!-- 新家对话框 -->
    <div
      class="modal-overlay"
      id="newHouseOverlay"
      onclick="closeNewHouseDialog()"
    >
      <div
        class="modal"
        style="max-width: 400px"
        onclick="event.stopPropagation()"
      >
        <button class="modal-close" onclick="closeNewHouseDialog()">✕</button>
        <div style="padding: 20px">
          <h2 style="margin: 0 0 20px 0; font-size: 1.5em">创建新家</h2>
          <input
            type="text"
            id="newHouseName"
            placeholder="家的名字"
            maxlength="50"
            style="
              width: 100%;
              padding: 10px;
              margin-bottom: 20px;
              border: 1px solid var(--border);
              border-radius: 4px;
              font-size: 1em;
            "
          />
          <div style="display: flex; gap: 10px; justify-content: flex-end">
            <button class="btn-secondary" onclick="closeNewHouseDialog()">
              取消
            </button>
            <button class="btn-primary" onclick="createNewHouse()">创建</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 改名对话框 -->
    <div
      class="modal-overlay"
      id="renameHouseOverlay"
      onclick="closeRenameHouseDialog()"
    >
      <div
        class="modal"
        style="max-width: 400px"
        onclick="event.stopPropagation()"
      >
        <button class="modal-close" onclick="closeRenameHouseDialog()">
          ✕
        </button>
        <div style="padding: 20px">
          <h2 style="margin: 0 0 20px 0; font-size: 1.5em">给家改名</h2>
          <input
            type="text"
            id="renameHouseName"
            placeholder="新的家名"
            maxlength="50"
            style="
              width: 100%;
              padding: 10px;
              margin-bottom: 20px;
              border: 1px solid var(--border);
              border-radius: 4px;
              font-size: 1em;
            "
          />
          <div style="display: flex; gap: 10px; justify-content: flex-end">
            <button class="btn-secondary" onclick="closeRenameHouseDialog()">
              取消
            </button>
            <button class="btn-primary" onclick="confirmRenameHouse()">
              保存
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 删除家对话框 -->
    <div
      class="modal-overlay"
      id="deleteHouseOverlay"
      onclick="closeDeleteHouseDialog()"
    >
      <div
        class="modal"
        style="max-width: 400px"
        onclick="event.stopPropagation()"
      >
        <button class="modal-close" onclick="closeDeleteHouseDialog()">
          ✕
        </button>
        <div style="padding: 20px">
          <h2 style="margin: 0 0 20px 0; font-size: 1.5em">删除家</h2>
          <div
            style="
              color: var(--ink-light);
              margin-bottom: 20px;
              line-height: 1.6;
            "
          >
            确定要删除家 <strong id="deleteHouseName">默认家</strong> 吗？
            <br />该家的所有食材将被删除，此操作无法撤销。
          </div>
          <div style="display: flex; gap: 10px; justify-content: flex-end">
            <button class="btn-secondary" onclick="closeDeleteHouseDialog()">
              取消
            </button>
            <button class="btn-danger" onclick="confirmDeleteHouse()">
              删除
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 密码验证弹窗 -->
    <div class="pw-overlay" id="pwOverlay">
      <div class="pw-box">
        <div class="pw-title">需要密码</div>
        <div class="pw-desc">编辑操作需要管理员密码</div>
        <input
          type="password"
          class="pw-input"
          id="pwInput"
          placeholder="输入密码..."
          onkeydown="if (event.key === 'Enter') pwConfirm();"
        />
        <div class="pw-actions">
          <button class="pw-cancel" onclick="pwCancel()">取消</button>
          <button class="pw-confirm" onclick="pwConfirm()">确认</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>

  <footer
    style="
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--ink-light);
      border-top: 1px solid var(--border);
      margin-top: 40px;
    "
  >
    🐱 喵王的食谱 · <span id="version">...</span>
    · © 2026 Yunjia ·
    <a
      href="https://github.com/Yunjia00/Recipe-app"
      target="_blank"
      style="color: var(--accent); text-decoration: none"
      >GitHub</a
    >
    ·
    <a href="/changelog" style="color: var(--accent); text-decoration: none"
      >Changelog</a
    >
  </footer>
</html>
